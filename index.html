<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control Comercial</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen p-4 sm:p-6">

    <div class="container mx-auto max-w-7xl">
        <header class="mb-8 border-b border-slate-800 pb-5 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
                <h1 class="text-2xl sm:text-3xl font-extrabold text-indigo-400 tracking-tight">Seguimiento de Programas & Ensayos</h1>
                <p class="text-slate-400 text-sm mt-1">Datos consolidados en vivo desde Google Sheets</p>
            </div>
            <div class="flex items-center gap-2 bg-slate-900 px-4 py-2 rounded-xl border border-slate-800">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span class="text-xs text-slate-300 font-medium">Actualización en vivo</span>
            </div>
        </header>

        <div id="kpi-summary" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 animate-pulse h-24"></div>
            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 animate-pulse h-24"></div>
            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 animate-pulse h-24"></div>
            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 animate-pulse h-24"></div>
        </div>

        <div class="bg-slate-900 rounded-2xl border border-slate-800 shadow-2xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-sm">
                    <thead>
                        <tr class="bg-slate-800/60 text-slate-400 font-semibold uppercase text-xs tracking-wider border-b border-slate-800">
                            <th class="p-4">Código / Programa</th>
                            <th class="p-4">Sector / Categoría</th>
                            <th class="p-4 text-center">Meta</th>
                            <th class="p-4 text-center">Llevamos</th>
                            <th class="p-4 text-center">Faltan</th>
                            <th class="p-4 text-center">Cumplimiento</th>
                            <th class="p-4 text-center">Prioridad</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-cuerpo" class="divide-y divide-slate-800/50 text-slate-300">
                        <tr>
                            <td colspan="7" class="text-center py-12 text-indigo-400 animate-pulse font-medium">
                                Conectando con la matriz de datos comerciales de Google...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ID de tu Google Sheet
        const SHEET_ID = '1mcbvKGq7HOH_N10MRmoOwhQd-bOdZvM0OO8vQjXFvSY';
        // Pedimos los datos puros en formato JSON visible
        const URL_API = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&cache=` + Math.random();

        async function cargarInformacion() {
            try {
                const respuesta = await fetch(URL_API);
                const texto = await respuesta.text();
                
                // Limpiar la envoltura de Google
                const inicioJson = texto.indexOf('{');
                const finJson = texto.lastIndexOf('}') + 1;
                const datos = JSON.parse(texto.substring(inicioJson, finJson));
                const filas = datos.table.rows;

                let htmlTabla = '';
                let datosTotales = { meta: '0', llevamos: '0', faltan: '0', porcentaje: '0%' };

                // Recorremos las filas devueltas por Google
                filas.forEach(fila => {
                    const c = fila.c;
                    if (!c) return;

                    // Extraer los valores disponibles limpiando nulos de forma segura
                    let celdasFiltradas = c.map(celda => {
                        if (!celda) return '';
                        return celda.f !== undefined ? celda.f : (celda.v !== null ? celda.v.toString() : '');
                    });

                    // Si la fila está completamente vacía, la ignoramos
                    if (celdasFiltradas.every(texto => texto === '')) return;

                    // Identificamos las columnas de forma dinámica basándonos en tu contenido real
                    const codigo      = celdasFiltradas[0] || '';
                    const sector      = celdasFiltradas[1] || '';
                    const programa    = celdasFiltradas[2] || '';
                    const meta        = celdasFiltradas[3] || '0';
                    const llevamos    = celdasFiltradas[4] || '0';
                    const faltan      = celdasFiltradas[5] || '0';
                    const porcentaje  = celdasFiltradas[6] || '0%';
                    const prioridad   = (celdasFiltradas[7] || '').toUpperCase().trim();

                    // Detectar si es la fila final de TOTALES
                    if (codigo.toUpperCase().includes("TOTALES") || sector.toUpperCase().includes("TOTALES")) {
                        datosTotales = { meta, llevamos, faltan, porcentaje };
                        return; // No la agregamos como fila común
                    }

                    // Diseñar etiquetas de color según prioridad
                    let clasePrioridad = 'bg-slate-800 text-slate-400 border border-slate-700/50';
                    if (prioridad === 'LOGRADO') clasePrioridad = 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20';
                    else if (prioridad === 'ALTA')  clasePrioridad = 'bg-rose-500/10 text-rose-400 border border-rose-500/20';
                    else if (prioridad === 'MEDIA') clasePrioridad = 'bg-amber-500/10 text-amber-400 border border-amber-500/20';
                    else if (prioridad === 'BAJA')  clasePrioridad = 'bg-sky-500/10 text-sky-400 border border-sky-500/20';

                    // Construimos la fila en la tabla
                    htmlTabla += `
                        <tr class="hover:bg-slate-800/30 transition-colors">
                            <td class="p-4">
                                <span class="font-mono text-indigo-400 font-bold block text-xs tracking-wide">${codigo}</span>
                                <span class="text-slate-200 font-medium text-xs sm:text-sm mt-0.5 block max-w-md whitespace-normal leading-tight">${programa}</span>
                            </td>
                            <td class="p-4 text-slate-400 align-middle font-medium">${sector}</td>
                            <td class="p-4 text-center font-semibold text-slate-100 align-middle">${meta}</td>
                            <td class="p-4 text-center font-semibold text-indigo-300 align-middle">${llevamos}</td>
                            <td class="p-4 text-center font-semibold text-rose-300 align-middle">${faltan}</td>
                            <td class="p-4 text-center align-middle">
                                <span class="text-sm font-black text-slate-100 bg-slate-950 px-2 py-1 rounded border border-slate-800">${porcentaje}</span>
                            </td>
                            <td class="p-4 text-center align-middle">
                                <span class="px-2.5 py-1 rounded-md text-[10px] font-bold tracking-wider inline-block ${clasePrioridad}">
                                    ${prioridad || 'N/A'}
                                </span>
                            </td>
                        </tr>
                    `;
                });

                // Renderizar cuerpo de la tabla
                document.getElementById('tabla-cuerpo').innerHTML = htmlTabla || '<tr><td colspan="7" class="p-8 text-center text-amber-400">No se detectaron registros válidos en las celdas.</td></tr>';

                // Renderizar los paneles numéricos superiores (KPIs)
                document.getElementById('kpi-summary').innerHTML = `
                    <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-lg">
                        <span class="text-xs text-slate-500 font-bold uppercase tracking-wider block">Meta Global</span>
                        <p class="text-2xl font-black text-slate-200 mt-1">${datosTotales.meta}</p>
                    </div>
                    <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-lg border-l-4 border-l-indigo-500">
                        <span class="text-xs text-slate-500 font-bold uppercase tracking-wider block">Total Logrado</span>
                        <p class="text-2xl font-black text-indigo-400 mt-1">${datosTotales.llevamos}</p>
                    </div>
                    <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-lg border-l-4 border-l-rose-500">
                        <span class="text-xs text-slate-500 font-bold uppercase tracking-wider block">Total Faltante</span>
                        <p class="text-2xl font-black text-rose-400 mt-1">${datosTotales.faltan}</p>
                    </div>
                    <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-lg border-l-4 border-l-emerald-500">
                        <span class="text-xs text-slate-500 font-bold uppercase tracking-wider block">% Cumplimiento Global</span>
                        <p class="text-2xl font-black text-emerald-400 mt-1">${datosTotales.porcentaje}</p>
                    </div>
                `;

            } catch (error) {
                console.error("Error en sincronización:", error);
                document.getElementById('tabla-cuerpo').innerHTML = `
                    <tr>
                        <td colspan="7" class="text-center py-12 text-rose-400 bg-red-950/10 p-6">
                            <p class="font-bold text-base">⚠️ Error de sincronización remota</p>
                            <p class="text-xs mt-1 text-slate-400">Verifica que tu archivo Google Sheets esté compartido públicamente.</p>
                            <p class="text-[11px] mt-4 text-indigo-400 bg-slate-950 px-3 py-1.5 rounded inline-block font-mono">
                                Configuración actual: Botón Compartir -> Acceso General -> Cualquier persona con el enlace (Lector).
                            </p>
                        </td>
                    </tr>
                `;
            }
        }

        // Bucle de refresco silencioso automático cada 10 segundos
        setInterval(cargarInformacion, 10000);
        
        // Primera carga inmediata al iniciar
        cargarInformacion();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control Financiero</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen p-4 sm:p-6">

    <div class="container mx-auto max-w-5xl">
        <header class="mb-8 border-b border-slate-800 pb-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
                <h1 class="text-2xl sm:text-3xl font-extrabold text-indigo-400 tracking-tight">Panel de Control Financiero</h1>
                <p class="text-slate-400 text-sm mt-1">Conectado en Vivo (Sincronización Inmediata)</p>
            </div>
            <button onclick="cargarDatosInmediatos()" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold px-4 py-2.5 rounded-xl transition-all shadow-lg active:scale-95">
                🔄 Forzar Actualización
            </button>
        </header>

        <div id="dashboard" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-12 text-indigo-400 animate-pulse font-medium">
                Estableciendo conexión segura con tus celdas de Google...
            </div>
        </div>
    </div>

    <script>
        // Tu enlace verificado con los datos actuales
        const URL_TU_TUNEL = 'https://script.google.com/macros/s/AKfycbxdtq2cf24CLXmxxZHbX39NGjZmSdS4cKHkT5dcBOYcu78UjDI8-a4x4w9ka_R4HL_Tyg/exec';

        async function cargarDatosInmediatos() {
            const contenedor = document.getElementById('dashboard');
            
            try {
                // Parche proxy transparente para evitar restricciones del navegador en entornos estáticos como GitHub Pages
                const respuesta = await fetch(URL_TU_TUNEL, { method: 'GET', redirect: 'follow' });
                
                if (!respuesta.ok) throw new Error();
                
                const datos = await respuesta.json();
                contenedor.innerHTML = ''; // Limpiamos la carga previa

                const indicadores = [
                    { 
                        nombre: "Meta Mensual Facturación", 
                        valor: datos.meta || "$0", 
                        detalle: "Meta fijada", 
                        color: "border-emerald-500", 
                        bgIcon: "bg-emerald-500/10", 
                        textIcon: "text-emerald-400" 
                    },
                    { 
                        nombre: "Venta del Mes", 
                        valor: datos.venta || "$0", 
                        detalle: "Acumulado actual", 
                        color: "border-indigo-500", 
                        bgIcon: "bg-indigo-500/10", 
                        textIcon: "text-indigo-400" 
                    },
                    { 
                        nombre: "Pendiente por Facturar", 
                        valor: datos.pendiente || "$0", 
                        detalle: "Brecha por cumplir", 
                        color: "border-amber-500", 
                        bgIcon: "bg-amber-500/10", 
                        textIcon: "text-amber-400" 
                    }
                ];

                // Dibujar tarjetas estructuradas
                indicadores.forEach(ind => {
                    const tarjeta = document.createElement('div');
                    tarjeta.className = `bg-slate-900 p-6 rounded-2xl border-l-4 ${ind.color} border border-y-slate-800 border-r-slate-800 flex flex-col justify-between shadow-2xl transition-all duration-200 hover:border-slate-700`;
                    
                    tarjeta.innerHTML = `
                        <div>
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Métrica</span>
                                <span class="${ind.bgIcon} ${ind.textIcon} text-[10px] font-bold px-2 py-0.5 rounded-md uppercase">${ind.detalle}</span>
                            </div>
                            <h2 class="text-lg font-bold text-slate-200 leading-snug">${ind.nombre}</h2>
                        </div>
                        <div class="mt-5">
                            <span class="text-2xl sm:text-3xl font-black text-white tracking-tight">${ind.valor}</span>
                        </div>
                        <div class="mt-4 pt-3 border-t border-slate-800/60 text-[11px] text-slate-500 flex items-center gap-1.5">
                            <span class="inline-block w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                            Sincronizado en tiempo real
                        </div>
                    `;
                    contenedor.appendChild(tarjeta);
                });

            } catch (error) {
                console.error(error);
                // Si el navegador rechaza la conexión fetch tradicional por políticas de sandbox CORS local,
                // usamos inyección JSONP automática de respaldo seguro.
                const scriptViejo = document.getElementById('jsonp-fallback');
                if (scriptViejo) scriptViejo.remove();
                
                window.procesarRespaldo = function(datosRespaldo) {
                    contenedor.innerHTML = '';
                    const backupInd = [
                        { nombre: "Meta Mensual Facturación", valor: datosRespaldo.meta, color: "border-emerald-500", bgIcon: "bg-emerald-500/10", textIcon: "text-emerald-400", detalle: "Meta" },
                        { nombre: "Venta del Mes", valor: datosRespaldo.venta, color: "border-indigo-500", bgIcon: "bg-indigo-500/10", textIcon: "text-indigo-400", detalle: "Venta" },
                        { nombre: "Pendiente por Facturar", valor: datosRespaldo.pendiente, color: "border-amber-500", bgIcon: "bg-amber-500/10", textIcon: "text-amber-400", detalle: "Pendiente" }
                    ];
                    
                    backupInd.forEach(ind => {
                        const tarjeta = document.createElement('div');
                        tarjeta.className = `bg-slate-900 p-6 rounded-2xl border-l-4 ${ind.color} border border-y-slate-800 border-r-slate-800 flex flex-col justify-between shadow-2xl`;
                        tarjeta.innerHTML = `
                            <div><div class="flex justify-between items-start mb-2"><span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Métrica</span><span class="${ind.bgIcon} ${ind.textIcon} text-[10px] font-bold px-2 py-0.5 rounded-md uppercase">${ind.detalle}</span></div><h2 class="text-lg font-bold text-slate-200">${ind.nombre}</h2></div>
                            <div class="mt-5"><span class="text-2xl sm:text-3xl font-black text-white">${ind.valor}</span></div>
                            <div class="mt-4 pt-3 border-t border-slate-800/60 text-[11px] text-slate-400 flex items-center gap-1.5"><span class="inline-block w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></span>Conexión Local Segura</div>
                        `;
                        contenedor.appendChild(tarjeta);
                    });
                };

                const script = document.createElement('script');
                script.id = 'jsonp-fallback';
                script.src = `${URL_TU_TUNEL}?callback=procesarRespaldo&_=` + Math.random();
                document.body.appendChild(script);
            }
        }

        // Bucle automático cada 7 segundos
        setInterval(cargarDatosInmediatos, 7000);

        // Inicialización
        cargarDatosInmediatos();
    </script>
</body>
</html>
